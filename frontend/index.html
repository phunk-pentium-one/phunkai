<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phunk Olhor AI</title>
  <meta name="description" content="Phunk Olhor AI — Asisten AI personal bebas dan cerdas" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <!-- Sidebar overlay (mobile) -->
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
          </svg>
        </div>
        <span class="sidebar-title">PHUNK_OLHOR</span>
      </div>

      <button id="btnNew" class="btn-new">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        [NEW_SESSION]
      </button>

      <div id="convList" class="conv-list"></div>
    </aside>

    <!-- Main -->
    <div class="main">

      <!-- Topbar -->
      <header class="topbar">
        <div class="topbar-left">
          <button id="btnMenu" class="btn-menu" aria-label="Toggle sidebar">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <span id="convTitleBar" class="conv-title-bar">IDLE_STATE</span>
        </div>
        <div class="topbar-right">
          <button id="btnTheme" class="btn-theme" aria-label="Toggle theme"></button>
        </div>
      </header>

      <!-- Chat messages -->
      <div id="chatArea" class="chat-area"></div>

      <!-- Input area -->
      <div class="input-area">
        <div id="statusBar" class="status-bar">SYSTEM_READY // SECURE_CONNECTION // PHUNK_PROTOCOL_V1</div>
        <div class="input-row">
          <textarea
            id="inputBox"
            class="input-box"
            placeholder="Enter command sequence..."
            rows="1"
          ></textarea>
          <button id="btnSend" class="btn-send" aria-label="Send">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
